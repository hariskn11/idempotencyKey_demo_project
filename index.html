<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver App Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for terminal log */
        .log-container::-webkit-scrollbar { width: 8px; }
        .log-container::-webkit-scrollbar-track { background: #1f2937; }
        .log-container::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-8 font-sans">
    <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <!-- Left Column: The Driver App UI -->
        <div class="bg-white rounded-xl shadow-lg p-6 border border-gray-200">
            <h2 class="text-2xl font-bold text-gray-800 mb-2 flex items-center">
                <svg class="w-6 h-6 mr-2 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                Driver App Simulator
            </h2>
            <p class="text-xs text-gray-500 mb-1" id="deviceInfo">Device ID: —</p>
            <p class="text-xs text-gray-400 mb-4" id="apiUrlInfo">API: —</p>
            
            <div id="pendingAlert" class="hidden mb-6 bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-r-md">
                <div class="flex">
                    <div class="flex-shrink-0">
                        <svg class="h-5 w-5 text-yellow-400" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
                    </div>
                    <div class="ml-3">
                        <p class="text-sm text-yellow-700 font-medium">Unfinished trip detected in Local Storage!</p>
                        <p class="text-xs text-yellow-600 mt-1" id="pendingKeyText"></p>
                    </div>
                </div>
            </div>

            <form id="tripForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Driver ID</label>
                    <input type="text" id="driverId" value="DRV_9921" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 bg-gray-50 focus:border-blue-500 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Vehicle Number</label>
                    <input type="text" id="vehicleNumber" value="KA-01-MJ-1234" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 bg-gray-50 focus:border-blue-500 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Start Location</label>
                    <input type="text" id="startLocation" value="Hub Terminal A" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 bg-gray-50 focus:border-blue-500 focus:ring-blue-500">
                </div>

                <div class="pt-4 flex flex-col gap-3">
                    <button type="button" onclick="executeTrip(false)" id="btnNormal" class="w-full bg-blue-600 text-white p-3 rounded-lg font-semibold hover:bg-blue-700 transition shadow-md">
                        1. Start Trip (Normal / Retry)
                    </button>
                    <button type="button" onclick="executeTrip(true)" id="btnCrash" class="w-full bg-red-500 text-white p-3 rounded-lg font-semibold hover:bg-red-600 transition shadow-md">
                        2. Start Trip & Simulate App Crash (Aborts at 2s)
                    </button>
                    <button type="button" onclick="clearStorage()" class="w-full bg-gray-200 text-gray-700 p-2 rounded-lg font-medium hover:bg-gray-300 transition mt-4 text-sm">
                        Reset Demo (Clear Local Storage)
                    </button>
                </div>
            </form>
        </div>

        <!-- Right Column: Live Terminal / Logs -->
        <div class="bg-gray-900 rounded-xl shadow-lg flex flex-col overflow-hidden border border-gray-700">
            <div class="bg-gray-800 px-4 py-3 border-b border-gray-700 flex justify-between items-center">
                <h3 class="text-gray-200 font-mono text-sm">Client-Side Request Logs</h3>
                <button onclick="clearLogs()" class="text-xs text-gray-400 hover:text-white">Clear Logs</button>
            </div>
            <div id="terminal" class="p-4 text-sm font-mono flex-1 overflow-y-auto log-container" style="height: 500px;">
                <!-- Logs will appear here -->
            </div>
        </div>
    </div>

    <script>
        // ===== CONFIGURATION =====
        // Change this to your deployed Vercel URL after deployment
        // For local testing, keep it as http://localhost:3000
        const API_BASE_URL = window.location.origin === 'http://localhost:3000' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:3000'
            : '';  // When deployed via Vercel, API is on same origin

        const STORAGE_KEY = 'pending_trip_key';
        const terminal = document.getElementById('terminal');
        const pendingAlert = document.getElementById('pendingAlert');
        const pendingKeyText = document.getElementById('pendingKeyText');

        // Show device info for multi-device testing
        function getDeviceId() {
            let deviceId = localStorage.getItem('device_id');
            if (!deviceId) {
                deviceId = 'DEVICE_' + crypto.randomUUID().slice(0, 8).toUpperCase();
                localStorage.setItem('device_id', deviceId);
            }
            return deviceId;
        }

        // Check local storage on page load
        function checkStorage() {
            const savedKey = localStorage.getItem(STORAGE_KEY);
            const deviceId = getDeviceId();
            document.getElementById('deviceInfo').innerText = `Device ID: ${deviceId}`;
            document.getElementById('apiUrlInfo').innerText = `API: ${API_BASE_URL || '(same origin)'}`;
            if (savedKey) {
                pendingAlert.classList.remove('hidden');
                pendingKeyText.innerText = `Key: ${savedKey}`;
                log('[Init] Found pending trip key in Local Storage. Ready to retry.', 'text-yellow-400');
            } else {
                pendingAlert.classList.add('hidden');
                log('[Init] App loaded. No pending trips found.', 'text-green-400');
            }
        }

        // Main action function
        async function executeTrip(simulateCrash) {
            const driverId = document.getElementById('driverId').value;
            const vehicleNumber = document.getElementById('vehicleNumber').value;
            const startLocation = document.getElementById('startLocation').value;
            const deviceId = getDeviceId();
            
            // Add simulateLag here so the backend knows whether to take 5s or 10s
            const payload = { 
                driverId, 
                vehicleNumber, 
                startLocation, 
                simulateLag: simulateCrash,
                deviceId    // Track which device is making the request
            };

            // 1. Handle Idempotency Key
            let idempotencyKey = localStorage.getItem(STORAGE_KEY);
            
            if (!idempotencyKey) {
                idempotencyKey = crypto.randomUUID();
                localStorage.setItem(STORAGE_KEY, idempotencyKey);
                log(`[Action] Generated NEW key & saved to storage: ${idempotencyKey}`, 'text-blue-300');
            } else {
                log(`[Action] Retrying with EXISTING key from storage: ${idempotencyKey}`, 'text-yellow-300');
            }

            checkStorage(); // Update UI
            
            log(`[Network] Sending POST /api/trips/start\nPayload: ${JSON.stringify(payload)}`, 'text-gray-300');

            // 2. Prepare Network Request
            const controller = new AbortController();
            let timeoutId;

            // If simulating crash, kill the request after 2 seconds
            if (simulateCrash) {
                log(`[Sim] Warning: App will "crash" (abort request) in 2 seconds...`, 'text-red-400');
                timeoutId = setTimeout(() => {
                    controller.abort();
                }, 2000);
            }

            // 3. Fire Request
            try {
                const response = await fetch(`${API_BASE_URL}/api/trips/start`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Idempotency-Key': idempotencyKey
                    },
                    body: JSON.stringify(payload),
                    signal: controller.signal
                });

                if (timeoutId) clearTimeout(timeoutId);

                const result = await response.json();
                
                if (response.ok) {
                    log(`[Success] Server Response: HTTP ${response.status}\nBody: ${JSON.stringify(result, null, 2)}`, 'text-green-400');
                    
                    // 4. CLEANUP: Only remove key when we successfully finish
                    localStorage.removeItem(STORAGE_KEY);
                    log(`[Cleanup] Key removed from local storage.`, 'text-gray-400');
                    checkStorage();
                } else {
                    log(`[Error] Server Response: HTTP ${response.status}\nBody: ${JSON.stringify(result)}`, 'text-red-400');
                }

            } catch (err) {
                if (err.name === 'AbortError') {
                    log(`\n❌ [CRASH SIMULATED] The driver closed the app! Network connection aborted.`, 'text-red-500 font-bold');
                    log(`Notice: The key is STILL in local storage. Click "Start Trip (Normal)" to retry.`, 'text-gray-300');
                } else {
                    log(`[Network Error] Failed to reach server. Is the backend running?`, 'text-red-500');
                }
            }
        }

        function clearStorage() {
            localStorage.removeItem(STORAGE_KEY);
            checkStorage();
            log('[Reset] Local storage cleared.', 'text-gray-500');
        }

        function log(message, colorClass = 'text-gray-300') {
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `mb-2 ${colorClass}`;
            // Preserve line breaks
            entry.innerHTML = `<span class="text-gray-500">[${time}]</span> ${message.replace(/\n/g, '<br>&nbsp;&nbsp;')}`;
            terminal.appendChild(entry);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function clearLogs() {
            terminal.innerHTML = '';
            log('[System] Logs cleared.', 'text-gray-500');
        }

        // Initialize UI
        checkStorage();
    </script>
</body>
</html>
